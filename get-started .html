<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f7f9fc 0%, #eef2f7 100%);
            color: #111827;
            font-family: "Poppins", Arial, sans-serif;
        }

        [data-theme="dark"] body {
            background: radial-gradient(circle at top, #111827 0%, #050814 100%);
            color: #e6eef8;
        }

        #theme-toggle {
            position: fixed;
            top: 18px;
            right: 18px;
            width: 46px;
            height: 46px;
            border-radius: 14px;
            border: none;
            background: rgba(255, 255, 255, 0.98);
            color: #111827;
            box-shadow: 0 20px 45px rgba(17, 24, 39, 0.12);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: transform 0.25s ease, background-color 0.25s ease, color 0.25s ease;
        }

        #theme-toggle:hover {
            transform: translateY(-3px);
            background: #f4b400;
            color: #111827;
        }
    </style>
</head>
<body>
        <button id="theme-toggle" aria-label="Toggle theme">🌙</button>
        <script>
            (function(){
                const root=document.documentElement;
                const btn=document.getElementById('theme-toggle');
                function applyTheme(theme){ if(theme==='dark'){root.setAttribute('data-theme','dark'); btn.textContent='☀️';} else {root.removeAttribute('data-theme'); btn.textContent='🌙';} }
                const saved=localStorage.getItem('theme');
                if(saved) applyTheme(saved);
                else if(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) applyTheme('dark');
                if(btn) btn.addEventListener('click', ()=>{ const isDark = root.getAttribute('data-theme') === 'dark'; const next = isDark ? 'light' : 'dark'; applyTheme(next); localStorage.setItem('theme', next); });
            })();
        </script>
</body>
</html>
